    #cursor.big{width:46px;height:46px;background:var(--yellow);}
    #scroll-bar{position:fixed;top:0;left:0;height:4px;background:var(--yellow);width:0%;z-index:9999;transition:width .1s linear;border-right:3px solid #000;}
    .reveal{opacity:0;transform:translateY(40px);transition:opacity .65s ease,transform .65s ease;}
    .reveal.from-left{transform:translateX(-50px);}
    .reveal.from-right{transform:translateX(50px);}
    .reveal.visible{opacity:1!important;transform:translate(0,0)!important;}
    .reveal.d1{transition-delay:.1s;}.reveal.d2{transition-delay:.2s;}.reveal.d3{transition-delay:.3s;}.reveal.d4{transition-delay:.4s;}
    .hw{display:inline-block;opacity:0;transform:translateY(56px);animation:wordIn .7s cubic-bezier(.22,1,.36,1) forwards;}
    @keyframes wordIn{to{opacity:1;transform:translateY(0);}}
    .mq-outer{overflow:hidden;white-space:nowrap;}
    .mq-track{display:inline-flex;animation:mq 22s linear infinite;}
    .mq-track:hover{animation-play-state:paused;}
    @keyframes mq{from{transform:translateX(0);}to{transform:translateX(-50%);}}
    .mq-item{display:inline-flex;align-items:center;gap:14px;padding:0 18px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;}
    .mq-dot{width:7px;height:7px;border-radius:50%;background:var(--yellow);flex-shrink:0;}
    .sec-lbl{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#888;margin-bottom:12px;}
    .sec-lbl::before{content:'';display:block;width:22px;height:2px;background:#999;}
    .stat-track{height:3px;background:rgba(255,255,255,.3);border-radius:2px;margin-top:8px;overflow:hidden;}
    .stat-fill{height:100%;background:#fff;width:0;border-radius:2px;transition:width 1.4s cubic-bezier(.4,0,.2,1);}
    .ghost-num{font-size:clamp(56px,10vw,88px);font-weight:900;line-height:1;opacity:.045;position:absolute;bottom:8px;right:14px;pointer-events:none;user-select:none;font-family:'Space Grotesk',sans-serif;}

    .insight-row{transition:transform .2s ease,box-shadow .2s ease;}

    .btn-pulse::after{content:'';position:absolute;inset:-6px;border:2px solid #fff;border-radius:8px;opacity:0;animation:bpulse 2.6s ease infinite;}
    @keyframes bpulse{0%{opacity:0;transform:scale(.95);}40%{opacity:.5;}100%{opacity:0;transform:scale(1.1);}}
    #exp-scroll::-webkit-scrollbar{display:none;}
    #exp-scroll{scrollbar-width:none;cursor:grab;}
    #exp-scroll:active{cursor:grabbing;}
    @media(hover:hover){.exp-card:hover{outline:4px solid #000;outline-offset:2px;}}
    @keyframes float{0%,100%{transform:translateY(0) rotate(45deg)}50%{transform:translateY(-12px) rotate(45deg)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.7)}}
    @keyframes fFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-14px)}}
    @keyframes fSpin{to{transform:rotate(360deg)}}

function useReveal(){
  useEffect(()=>{

    els.forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);
}

<script>
const cur=document.getElementById('cursor');
if(window.matchMedia('(hover:hover)and(pointer:fine)').matches){
  document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});
  document.addEventListener('mouseover',e=>{if(e.target.closest('a,button,.hover-lift,.cert-badge,.insight-row,.funnel-card'))cur.classList.add('big');});
  document.addEventListener('mouseout',e=>{if(e.target.closest('a,button,.hover-lift,.cert-badge,.insight-row,.funnel-card'))cur.classList.remove('big');});
}
(function(){
  const el=document.getElementById('exp-scroll');
  if(!el)return;
  let isDown=false,startX,scrollLeft;
  el.addEventListener('mousedown',e=>{isDown=true;el.style.cursor='grabbing';startX=e.pageX-el.offsetLeft;scrollLeft=el.scrollLeft;});
  el.addEventListener('mouseleave',()=>{isDown=false;el.style.cursor='grab';});
  el.addEventListener('mouseup',()=>{isDown=false;el.style.cursor='grab';});
  el.addEventListener('mousemove',e=>{if(!isDown)return;e.preventDefault();el.scrollLeft=scrollLeft-(e.pageX-el.offsetLeft-startX)*1.4;});
  el.addEventListener('scroll',()=>{
    const dots=document.querySelectorAll('.exp-dot');
    const cards=el.querySelectorAll('.exp-card');
    let closest=0,minDiff=Infinity;
    cards.forEach((c,i)=>{const diff=Math.abs(c.getBoundingClientRect().left-el.getBoundingClientRect().left);if(diff<minDiff){minDiff=diff;closest=i;}});
    dots.forEach((d,i)=>{d.style.width=i===closest?'28px':'8px';d.style.background=i===closest?'#111':'rgba(0,0,0,.2)';});
  },{passive:true});
})();
if(window.matchMedia('(hover:hover)').matches){
  document.querySelectorAll('.parallax-panel').forEach(panel=>{
    const shimmer=panel.querySelector('.panel-shimmer');
    if(!shimmer)return;
    panel.addEventListener('mousemove',e=>{
      const rect=panel.getBoundingClientRect();
      shimmer.style.setProperty('--mx',((e.clientX-rect.left)/rect.width*100).toFixed(1)+'%');
      shimmer.style.setProperty('--my',((e.clientY-rect.top)/rect.height*100).toFixed(1)+'%');
    });
  });
}
function applyMobileLayout(){
  const isMobile=window.innerWidth<768;
  document.querySelectorAll('.parallax-panel,#contact').forEach(el=>{
    if(isMobile){el.style.position='relative';el.style.top='auto';el.style.minHeight='auto';el.style.padding='56px 20px';}
    else{el.style.position='sticky';el.style.top='var(--nav-h,96px)';el.style.minHeight='100vh';el.style.padding='';}
  });
}
applyMobileLayout();
window.addEventListener('resize',applyMobileLayout);
const pg=document.getElementById('scroll-bar');
const navBar=document.getElementById('nav-bar');
window.addEventListener('scroll',()=>{
  if(pg)pg.style.width=(window.scrollY/(document.body.scrollHeight-window.innerHeight)*100)+'%';
  if(navBar){if(window.scrollY>60){navBar.style.background='rgba(245,243,238,.92)';navBar.style.backdropFilter='blur(14px)';}else{navBar.style.background='#F5F3EE';navBar.style.backdropFilter='';}}
},{passive:true});
</script>
